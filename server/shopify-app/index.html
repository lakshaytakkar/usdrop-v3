<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USDrop Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] },
          colors: { shopify: '#95BF47', usdrop: '#3B82F6' }
        }
      }
    }
  </script>
  <style>
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; background: #f6f6f7; }
    .tab-active { color: #3B82F6; border-bottom: 2px solid #3B82F6; }
    .tab-inactive { color: #6b7280; border-bottom: 2px solid transparent; }
    .tab-inactive:hover { color: #374151; }
    .score-good { background: #dcfce7; color: #166534; }
    .score-avg { background: #fef9c3; color: #854d0e; }
    .score-poor { background: #fecaca; color: #991b1b; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
    <div class="flex items-center gap-3 mb-6">
      <div class="h-9 w-9 rounded-lg bg-blue-500 flex items-center justify-center">
        <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-900">USDrop Tools</h1>
        <p class="text-xs text-gray-500" id="shop-label"></p>
      </div>
    </div>

    <div class="border-b border-gray-200 mb-6">
      <nav class="flex gap-6" id="tab-nav">
        <button onclick="switchTab('profit')" class="tab-active pb-3 text-sm font-medium transition-colors" id="tab-btn-profit">Profit Calculator</button>
        <button onclick="switchTab('prices')" class="tab-inactive pb-3 text-sm font-medium transition-colors" id="tab-btn-prices">Price Editor</button>
        <button onclick="switchTab('seo')" class="tab-inactive pb-3 text-sm font-medium transition-colors" id="tab-btn-seo">SEO Scorer</button>
      </nav>
    </div>

    <div id="content-profit" class="fade-in"></div>
    <div id="content-prices" class="hidden fade-in"></div>
    <div id="content-seo" class="hidden fade-in"></div>

    <div id="loading" class="flex items-center justify-center py-20">
      <div class="flex flex-col items-center gap-3">
        <div class="h-8 w-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm text-gray-500">Loading store data...</p>
      </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-4 py-2.5 rounded-lg text-sm shadow-lg hidden transition-all z-50"></div>
  </div>

<script>
const SHOP = '{{SHOP}}';
const HOST = '{{HOST}}';
const API_CLIENT_ID = '{{SHOPIFY_CLIENT_ID}}';

let products = [];
let orders = [];
let currentTab = 'profit';
let priceChanges = {};

document.getElementById('shop-label').textContent = SHOP || 'Connected Store';

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `fixed bottom-4 right-4 px-4 py-2.5 rounded-lg text-sm shadow-lg z-50 text-white ${isError ? 'bg-red-600' : 'bg-gray-900'}`;
  setTimeout(() => { t.className += ' hidden'; }, 3500);
}

function switchTab(tab) {
  currentTab = tab;
  ['profit', 'prices', 'seo'].forEach(t => {
    document.getElementById('content-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-btn-' + t);
    btn.className = t === tab ? 'tab-active pb-3 text-sm font-medium transition-colors' : 'tab-inactive pb-3 text-sm font-medium transition-colors';
  });
}

async function apiFetch(url) {
  const sep = url.includes('?') ? '&' : '?';
  return fetch(url + sep + 'shop=' + encodeURIComponent(SHOP));
}

async function loadData() {
  try {
    const [pRes, oRes] = await Promise.all([
      apiFetch('/shopify-app/api/products'),
      apiFetch('/shopify-app/api/orders')
    ]);
    if (pRes.ok) { const d = await pRes.json(); products = d.products || []; }
    if (oRes.ok) { const d = await oRes.json(); orders = d.orders || []; }
    document.getElementById('loading').classList.add('hidden');
    renderProfit();
    renderPrices();
    renderSEO();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<p class="text-center text-red-500 py-10">Failed to load data. Please refresh.</p>';
  }
}

// ═══════════════════════════ PROFIT CALCULATOR ═══════════════════════════

function renderProfit() {
  const paidOrders = orders.filter(o => o.financial_status === 'paid' || o.financial_status === 'partially_paid');

  const productStats = products.map(p => {
    let unitsSold = 0, revenue = 0;
    paidOrders.forEach(o => {
      (o.line_items || []).forEach(li => {
        if (String(li.product_id) === String(p.shopify_product_id)) {
          unitsSold += li.quantity || 0;
          revenue += parseFloat(li.price || 0) * (li.quantity || 0);
        }
      });
    });
    const price = p.price || 0;
    const costPerUnit = p.compare_at_price ? price - (p.compare_at_price * 0.4) : price * 0.4;
    const totalCost = costPerUnit * unitsSold;
    const shopifyFees = revenue * 0.029 + unitsSold * 0.30;
    const netProfit = revenue - totalCost - shopifyFees;
    const margin = revenue > 0 ? (netProfit / revenue) * 100 : 0;
    return { ...p, unitsSold, revenue, totalCost, shopifyFees, netProfit, margin };
  }).filter(p => p.unitsSold > 0 || p.price > 0);

  productStats.sort((a, b) => b.netProfit - a.netProfit);

  const totalRevenue = productStats.reduce((s, p) => s + p.revenue, 0);
  const totalProfit = productStats.reduce((s, p) => s + p.netProfit, 0);
  const avgMargin = totalRevenue > 0 ? (totalProfit / totalRevenue) * 100 : 0;
  const best = productStats.length > 0 ? productStats[0] : null;

  const el = document.getElementById('content-profit');
  el.innerHTML = `
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      ${summaryCard('Total Revenue', '$' + totalRevenue.toFixed(2), 'text-gray-900')}
      ${summaryCard('Est. Net Profit', '$' + totalProfit.toFixed(2), totalProfit >= 0 ? 'text-green-600' : 'text-red-600')}
      ${summaryCard('Avg. Margin', avgMargin.toFixed(1) + '%', avgMargin >= 20 ? 'text-green-600' : avgMargin >= 0 ? 'text-amber-600' : 'text-red-600')}
      ${summaryCard('Top Product', best ? best.title.substring(0, 30) : 'N/A', 'text-blue-600', true)}
    </div>
    ${productStats.length === 0 ? emptyState('No sales data yet', 'Profit data will appear once you have orders.') : `
    <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
            <tr>
              <th class="px-4 py-3 text-left font-medium">Product</th>
              <th class="px-4 py-3 text-right font-medium">Units Sold</th>
              <th class="px-4 py-3 text-right font-medium">Revenue</th>
              <th class="px-4 py-3 text-right font-medium">Est. COGS</th>
              <th class="px-4 py-3 text-right font-medium">Shopify Fees</th>
              <th class="px-4 py-3 text-right font-medium">Net Profit</th>
              <th class="px-4 py-3 text-right font-medium">Margin</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            ${productStats.map(p => `
              <tr class="hover:bg-gray-50">
                <td class="px-4 py-3">
                  <div class="flex items-center gap-2.5">
                    ${p.image_url ? `<img src="${p.image_url}" class="h-8 w-8 rounded object-cover border border-gray-200">` : `<div class="h-8 w-8 rounded bg-gray-100 flex items-center justify-center"><svg class="h-4 w-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`}
                    <span class="font-medium text-gray-900 truncate max-w-[200px]">${p.title}</span>
                  </div>
                </td>
                <td class="px-4 py-3 text-right text-gray-700">${p.unitsSold}</td>
                <td class="px-4 py-3 text-right text-gray-900 font-medium">$${p.revenue.toFixed(2)}</td>
                <td class="px-4 py-3 text-right text-gray-500">$${p.totalCost.toFixed(2)}</td>
                <td class="px-4 py-3 text-right text-gray-500">$${p.shopifyFees.toFixed(2)}</td>
                <td class="px-4 py-3 text-right font-semibold ${p.netProfit >= 0 ? 'text-green-600' : 'text-red-600'}">$${p.netProfit.toFixed(2)}</td>
                <td class="px-4 py-3 text-right"><span class="inline-flex px-2 py-0.5 rounded-full text-xs font-semibold ${p.margin >= 30 ? 'score-good' : p.margin >= 10 ? 'score-avg' : 'score-poor'}">${p.margin.toFixed(1)}%</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>`}
    <p class="text-xs text-gray-400 mt-4">Fees estimated at 2.9% + $0.30 per transaction (Shopify Payments). COGS estimated from compare-at-price or 60% markup assumption.</p>
  `;
}

// ═══════════════════════════ PRICE EDITOR ═══════════════════════════

function renderPrices() {
  priceChanges = {};
  const el = document.getElementById('content-prices');

  if (products.length === 0) {
    el.innerHTML = emptyState('No products found', 'Sync your store to see products here.');
    return;
  }

  el.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <input type="text" id="price-search" placeholder="Search products..." class="h-9 px-3 text-sm border border-gray-200 rounded-lg bg-white w-64 outline-none focus:border-blue-500" oninput="filterPriceTable()">
        <span id="change-count" class="text-xs text-gray-400"></span>
      </div>
      <button id="btn-update-all" onclick="pushAllPrices()" class="h-9 px-4 bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hidden transition-colors">
        Update All on Shopify
      </button>
    </div>
    <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
            <tr>
              <th class="px-4 py-3 text-left font-medium">Product</th>
              <th class="px-4 py-3 text-right font-medium">Current Price</th>
              <th class="px-4 py-3 text-right font-medium">New Price</th>
              <th class="px-4 py-3 text-right font-medium">Compare At</th>
              <th class="px-4 py-3 text-center font-medium">Status</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100" id="price-tbody">
            ${products.map(p => priceRow(p)).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <p class="text-xs text-gray-400 mt-4">Changes are pushed to Shopify as draft updates. Edit prices inline and click "Update All on Shopify" to apply.</p>
  `;
}

function priceRow(p) {
  return `
    <tr class="hover:bg-gray-50 price-row" data-id="${p.id}" data-title="${(p.title||'').toLowerCase()}">
      <td class="px-4 py-3">
        <div class="flex items-center gap-2.5">
          ${p.image_url ? `<img src="${p.image_url}" class="h-8 w-8 rounded object-cover border border-gray-200">` : `<div class="h-8 w-8 rounded bg-gray-100"></div>`}
          <span class="font-medium text-gray-900 truncate max-w-[220px]">${p.title}</span>
        </div>
      </td>
      <td class="px-4 py-3 text-right text-gray-500">$${(p.price || 0).toFixed(2)}</td>
      <td class="px-4 py-3 text-right">
        <input type="number" step="0.01" min="0" value="${(p.price || 0).toFixed(2)}" class="h-8 w-24 px-2 text-sm text-right border border-gray-200 rounded bg-white outline-none focus:border-blue-500" onchange="onPriceChange('${p.id}', 'price', this.value, ${p.price || 0})">
      </td>
      <td class="px-4 py-3 text-right">
        <input type="number" step="0.01" min="0" value="${(p.compare_at_price || 0).toFixed(2)}" class="h-8 w-24 px-2 text-sm text-right border border-gray-200 rounded bg-white outline-none focus:border-blue-500" onchange="onPriceChange('${p.id}', 'compare_at_price', this.value, ${p.compare_at_price || 0})">
      </td>
      <td class="px-4 py-3 text-center" id="status-${p.id}"><span class="text-xs text-gray-300">—</span></td>
    </tr>
  `;
}

function onPriceChange(id, field, newVal, origVal) {
  const val = parseFloat(newVal);
  if (!priceChanges[id]) priceChanges[id] = {};
  if (Math.abs(val - origVal) > 0.001) {
    priceChanges[id][field] = val;
  } else {
    delete priceChanges[id][field];
    if (Object.keys(priceChanges[id]).length === 0) delete priceChanges[id];
  }
  updateChangeCount();
}

function updateChangeCount() {
  const count = Object.keys(priceChanges).length;
  const countEl = document.getElementById('change-count');
  const btnEl = document.getElementById('btn-update-all');
  if (countEl) countEl.textContent = count > 0 ? `${count} product${count > 1 ? 's' : ''} changed` : '';
  if (btnEl) btnEl.classList.toggle('hidden', count === 0);
}

function filterPriceTable() {
  const q = (document.getElementById('price-search')?.value || '').toLowerCase();
  document.querySelectorAll('.price-row').forEach(row => {
    row.style.display = row.dataset.title.includes(q) ? '' : 'none';
  });
}

async function pushAllPrices() {
  const ids = Object.keys(priceChanges);
  if (ids.length === 0) return;
  const btn = document.getElementById('btn-update-all');
  btn.disabled = true;
  btn.textContent = 'Updating...';

  let success = 0, failed = 0;
  for (const id of ids) {
    const changes = priceChanges[id];
    const statusEl = document.getElementById('status-' + id);
    if (statusEl) statusEl.innerHTML = '<div class="h-4 w-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>';

    try {
      const product = products.find(p => p.id === id);
      const body = {
        price: changes.price ?? product?.price ?? 0,
        compare_at_price: changes.compare_at_price ?? product?.compare_at_price ?? null
      };
      const res = await fetch(`/shopify-app/api/products/${id}/price?shop=${encodeURIComponent(SHOP)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        success++;
        if (statusEl) statusEl.innerHTML = '<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-semibold score-good">Updated</span>';
        delete priceChanges[id];
      } else {
        const d = await res.json();
        failed++;
        if (statusEl) statusEl.innerHTML = `<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-semibold score-poor" title="${d.error || 'Error'}">Failed</span>`;
      }
    } catch {
      failed++;
      if (statusEl) statusEl.innerHTML = '<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-semibold score-poor">Error</span>';
    }
  }

  btn.disabled = false;
  btn.textContent = 'Update All on Shopify';
  updateChangeCount();
  showToast(failed === 0 ? `${success} product${success > 1 ? 's' : ''} updated on Shopify` : `${success} updated, ${failed} failed`, failed > 0);
}

// ═══════════════════════════ SEO SCORER ═══════════════════════════

function scoreSEO(p) {
  let score = 0;
  const checks = [];

  const title = (p.title || '').trim();
  const titleLen = title.length;
  if (titleLen >= 50 && titleLen <= 70) { score += 20; checks.push({ label: 'Title length', pts: 20, max: 20, tip: 'Ideal length (50-70 chars)' }); }
  else if (titleLen >= 30 && titleLen <= 100) { score += 12; checks.push({ label: 'Title length', pts: 12, max: 20, tip: `${titleLen} chars — aim for 50-70` }); }
  else if (titleLen > 0) { score += 5; checks.push({ label: 'Title length', pts: 5, max: 20, tip: `${titleLen} chars — too ${titleLen < 30 ? 'short' : 'long'}` }); }
  else { checks.push({ label: 'Title length', pts: 0, max: 20, tip: 'Missing title' }); }

  const desc = (p.body_html || '').trim();
  const descText = desc.replace(/<[^>]*>/g, '').trim();
  const descLen = descText.length;
  if (descLen >= 150) { score += 15; checks.push({ label: 'Description length', pts: 15, max: 15, tip: 'Good length' }); }
  else if (descLen >= 50) { score += 8; checks.push({ label: 'Description length', pts: 8, max: 15, tip: `${descLen} chars — aim for 150+` }); }
  else if (descLen > 0) { score += 3; checks.push({ label: 'Description length', pts: 3, max: 15, tip: 'Too short — add more detail' }); }
  else { checks.push({ label: 'Description length', pts: 0, max: 15, tip: 'Missing description' }); }

  const hasHtml = /<(p|ul|li|h[1-6]|br|strong|em)\b/i.test(desc);
  if (hasHtml && descLen > 0) { score += 10; checks.push({ label: 'Formatting', pts: 10, max: 10, tip: 'Uses HTML formatting' }); }
  else if (descLen > 0) { score += 3; checks.push({ label: 'Formatting', pts: 3, max: 10, tip: 'Add headings, lists, or bold for better readability' }); }
  else { checks.push({ label: 'Formatting', pts: 0, max: 10, tip: 'No description to format' }); }

  if (p.image_url) { score += 20; checks.push({ label: 'Product image', pts: 20, max: 20, tip: 'Has image' }); }
  else { checks.push({ label: 'Product image', pts: 0, max: 20, tip: 'Missing product image' }); }

  if (p.price && p.price > 0) { score += 10; checks.push({ label: 'Price set', pts: 10, max: 10, tip: 'Price configured' }); }
  else { checks.push({ label: 'Price set', pts: 0, max: 10, tip: 'No price set' }); }

  if (p.compare_at_price && p.compare_at_price > (p.price || 0)) { score += 5; checks.push({ label: 'Compare-at price', pts: 5, max: 5, tip: 'Shows perceived deal to customers' }); }
  else { checks.push({ label: 'Compare-at price', pts: 0, max: 5, tip: 'Add compare-at price to show savings' }); }

  const tags = p.tags || [];
  const tagCount = Array.isArray(tags) ? tags.length : (typeof tags === 'string' ? tags.split(',').filter(Boolean).length : 0);
  if (tagCount >= 5) { score += 20; checks.push({ label: 'Tags', pts: 20, max: 20, tip: `${tagCount} tags — good for discoverability` }); }
  else if (tagCount >= 2) { score += 10; checks.push({ label: 'Tags', pts: 10, max: 20, tip: `${tagCount} tags — add more for better SEO` }); }
  else if (tagCount >= 1) { score += 5; checks.push({ label: 'Tags', pts: 5, max: 20, tip: 'Add more tags (aim for 5+)' }); }
  else { checks.push({ label: 'Tags', pts: 0, max: 20, tip: 'No tags — add keywords for discoverability' }); }

  return { score, checks };
}

function renderSEO() {
  const el = document.getElementById('content-seo');

  if (products.length === 0) {
    el.innerHTML = emptyState('No products found', 'Sync your store to analyze product SEO.');
    return;
  }

  const scored = products.map(p => ({ ...p, seo: scoreSEO(p) }));
  scored.sort((a, b) => a.seo.score - b.seo.score);

  const avgScore = scored.reduce((s, p) => s + p.seo.score, 0) / scored.length;
  const needsWork = scored.filter(p => p.seo.score < 50).length;
  const good = scored.filter(p => p.seo.score >= 75).length;

  el.innerHTML = `
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      ${summaryCard('Average Score', avgScore.toFixed(0) + '/100', avgScore >= 70 ? 'text-green-600' : avgScore >= 40 ? 'text-amber-600' : 'text-red-600')}
      ${summaryCard('Products', scored.length.toString(), 'text-gray-900')}
      ${summaryCard('Needs Work', needsWork.toString(), needsWork > 0 ? 'text-red-600' : 'text-green-600')}
      ${summaryCard('Good (75+)', good.toString(), 'text-green-600')}
    </div>
    <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
            <tr>
              <th class="px-4 py-3 text-left font-medium">Product</th>
              <th class="px-4 py-3 text-center font-medium">Score</th>
              <th class="px-4 py-3 text-left font-medium">Key Issues</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            ${scored.map(p => {
              const issues = p.seo.checks.filter(c => c.pts < c.max).slice(0, 3);
              return `
              <tr class="hover:bg-gray-50 cursor-pointer" onclick="toggleSeoDetail('${p.id}')">
                <td class="px-4 py-3">
                  <div class="flex items-center gap-2.5">
                    ${p.image_url ? `<img src="${p.image_url}" class="h-8 w-8 rounded object-cover border border-gray-200">` : `<div class="h-8 w-8 rounded bg-gray-100"></div>`}
                    <span class="font-medium text-gray-900 truncate max-w-[220px]">${p.title}</span>
                  </div>
                </td>
                <td class="px-4 py-3 text-center">
                  <span class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-bold ${p.seo.score >= 75 ? 'score-good' : p.seo.score >= 50 ? 'score-avg' : 'score-poor'}">${p.seo.score}/100</span>
                </td>
                <td class="px-4 py-3 text-gray-500 text-xs">
                  ${issues.length === 0 ? '<span class="text-green-600">All checks passed</span>' : issues.map(i => i.tip).join(' · ')}
                </td>
              </tr>
              <tr id="seo-detail-${p.id}" class="hidden bg-gray-50">
                <td colspan="3" class="px-6 py-4">
                  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                    ${p.seo.checks.map(c => `
                      <div class="flex items-start gap-2 text-xs">
                        <span class="shrink-0 mt-0.5 h-4 w-4 rounded-full flex items-center justify-center ${c.pts === c.max ? 'bg-green-100 text-green-600' : c.pts >= c.max / 2 ? 'bg-amber-100 text-amber-600' : 'bg-red-100 text-red-600'}">
                          ${c.pts === c.max ? '✓' : c.pts > 0 ? '~' : '✗'}
                        </span>
                        <div>
                          <span class="font-medium text-gray-700">${c.label}</span>
                          <span class="text-gray-400 ml-1">${c.pts}/${c.max}</span>
                          <p class="text-gray-500 mt-0.5">${c.tip}</p>
                        </div>
                      </div>
                    `).join('')}
                  </div>
                </td>
              </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function toggleSeoDetail(id) {
  const el = document.getElementById('seo-detail-' + id);
  if (el) el.classList.toggle('hidden');
}
