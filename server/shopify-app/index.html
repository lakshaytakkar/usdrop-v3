<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USDrop Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3B82F6', 600: '#2563eb', 700: '#1d4ed8' },
            surface: { 50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4' }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #F5F5F7; margin: 0; -webkit-font-smoothing: antialiased; }

    .tab-btn { position: relative; padding: 10px 16px; font-size: 13px; font-weight: 600; color: #6b7280; border: none; background: none; cursor: pointer; transition: color 0.15s; }
    .tab-btn:hover { color: #374151; }
    .tab-btn.active { color: #3B82F6; }
    .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: #3B82F6; border-radius: 2px 2px 0 0; }

    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; }
    .stat-card { padding: 20px 24px; }
    .stat-label { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table thead { background: #f9fafb; }
    .data-table th { padding: 10px 20px; text-align: left; font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #f3f4f6; }
    .data-table td { padding: 14px 20px; border-bottom: 1px solid #f3f4f6; color: #374151; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f9fafb; }
    .data-table .text-right { text-align: right; }
    .data-table .text-center { text-align: center; }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
    .badge-green { background: #ecfdf5; color: #059669; }
    .badge-yellow { background: #fffbeb; color: #d97706; }
    .badge-red { background: #fef2f2; color: #dc2626; }

    .product-img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; border: 1px solid #e5e7eb; flex-shrink: 0; }
    .product-placeholder { width: 36px; height: 36px; border-radius: 8px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .btn-primary { display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 16px; background: #3B82F6; color: #fff; font-size: 13px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-field { height: 34px; padding: 0 10px; font-size: 13px; font-family: inherit; border: 1px solid #e5e7eb; border-radius: 8px; outline: none; background: #fff; transition: border-color 0.15s; }
    .input-field:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

    .seo-bar { height: 6px; border-radius: 3px; background: #f3f4f6; overflow: hidden; }
    .seo-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

    .check-icon { width: 16px; height: 16px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }

    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #fff; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <div id="app" style="max-width: 1120px; margin: 0 auto; padding: 24px 24px 48px;">

    <header style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
      <div style="display: flex; align-items: center; gap: 14px;">
        <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #3B82F6, #2563eb); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(59,130,246,0.25);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div>
          <h1 style="font-size: 18px; font-weight: 800; color: #111827; margin: 0; letter-spacing: -0.02em;">USDrop</h1>
          <p style="font-size: 12px; color: #9ca3af; margin: 2px 0 0; font-weight: 500;" id="shop-label"></p>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <span style="font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em;">Shopify Tools</span>
        <span style="width: 6px; height: 6px; background: #10b981; border-radius: 50; display: inline-block;"></span>
      </div>
    </header>

    <nav class="card" style="padding: 0 8px; margin-bottom: 24px; display: flex; gap: 0; border-radius: 12px; overflow-x: auto;">
      <button onclick="switchTab('profit')" class="tab-btn active" id="tab-btn-profit">
        <span style="display: inline-flex; align-items: center; gap: 6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Profit Calculator
        </span>
      </button>
      <button onclick="switchTab('prices')" class="tab-btn" id="tab-btn-prices">
        <span style="display: inline-flex; align-items: center; gap: 6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Price Editor
        </span>
      </button>
      <button onclick="switchTab('seo')" class="tab-btn" id="tab-btn-seo">
        <span style="display: inline-flex; align-items: center; gap: 6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          SEO Scorer
        </span>
      </button>
    </nav>

    <div id="content-profit" class="fade-in"></div>
    <div id="content-prices" class="hidden fade-in"></div>
    <div id="content-seo" class="hidden fade-in"></div>

    <div id="loading" style="display: flex; align-items: center; justify-content: center; padding: 80px 0;">
      <div style="text-align: center;">
        <div style="width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #3B82F6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;"></div>
        <p style="font-size: 13px; color: #9ca3af; font-weight: 500;">Loading store data...</p>
      </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <div id="toast" class="toast"></div>
  </div>

<script>
const SHOP = '{{SHOP}}';
const HOST = '{{HOST}}';
const API_CLIENT_ID = '{{SHOPIFY_CLIENT_ID}}';

let products = [];
let orders = [];
let currentTab = 'profit';
let priceChanges = {};

document.getElementById('shop-label').textContent = SHOP || 'Connected Store';

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#dc2626' : '#111827';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function switchTab(tab) {
  currentTab = tab;
  ['profit', 'prices', 'seo'].forEach(t => {
    document.getElementById('content-' + t).classList.toggle('hidden', t !== tab);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab);
  });
}

async function apiFetch(url) {
  const sep = url.includes('?') ? '&' : '?';
  return fetch(url + sep + 'shop=' + encodeURIComponent(SHOP));
}

async function loadData() {
  try {
    const [pRes, oRes] = await Promise.all([
      apiFetch('/shopify-app/api/products'),
      apiFetch('/shopify-app/api/orders')
    ]);
    if (pRes.ok) { const d = await pRes.json(); products = d.products || []; }
    if (oRes.ok) { const d = await oRes.json(); orders = d.orders || []; }
    document.getElementById('loading').style.display = 'none';
    renderProfit();
    renderPrices();
    renderSEO();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<p style="text-align:center;color:#dc2626;padding:40px;font-size:14px;">Failed to load data. Please refresh.</p>';
  }
}

function productCell(p) {
  const img = p.image_url
    ? `<img src="${p.image_url}" class="product-img" alt="">`
    : `<div class="product-placeholder"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
  return `<div style="display:flex;align-items:center;gap:12px;">${img}<span style="font-weight:600;color:#111827;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">${p.title}</span></div>`;
}

function marginBadge(margin) {
  const cls = margin >= 30 ? 'badge-green' : margin >= 10 ? 'badge-yellow' : 'badge-red';
  return `<span class="badge ${cls}">${margin.toFixed(1)}%</span>`;
}

function money(val) { return '$' + val.toFixed(2); }

// ═══════════════════════════ PROFIT CALCULATOR ═══════════════════════════

function renderProfit() {
  const paidOrders = orders.filter(o => o.financial_status === 'paid' || o.financial_status === 'partially_paid');

  const productStats = products.map(p => {
    let unitsSold = 0, revenue = 0;
    paidOrders.forEach(o => {
      (o.line_items || []).forEach(li => {
        if (String(li.product_id) === String(p.shopify_product_id)) {
          unitsSold += li.quantity || 0;
          revenue += parseFloat(li.price || 0) * (li.quantity || 0);
        }
      });
    });
    const price = p.price || 0;
    const costPerUnit = p.compare_at_price ? price - (p.compare_at_price * 0.4) : price * 0.4;
    const totalCost = costPerUnit * unitsSold;
    const shopifyFees = revenue * 0.029 + unitsSold * 0.30;
    const netProfit = revenue - totalCost - shopifyFees;
    const margin = revenue > 0 ? (netProfit / revenue) * 100 : 0;
    return { ...p, unitsSold, revenue, totalCost, shopifyFees, netProfit, margin };
  }).filter(p => p.unitsSold > 0 || p.price > 0);

  productStats.sort((a, b) => b.netProfit - a.netProfit);

  const totalRevenue = productStats.reduce((s, p) => s + p.revenue, 0);
  const totalProfit = productStats.reduce((s, p) => s + p.netProfit, 0);
  const totalFees = productStats.reduce((s, p) => s + p.shopifyFees, 0);
  const avgMargin = totalRevenue > 0 ? (totalProfit / totalRevenue) * 100 : 0;
  const best = productStats.length > 0 ? productStats[0] : null;

  document.getElementById('content-profit').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
      <div class="card stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" style="color:#111827;">${money(totalRevenue)}</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Net Profit</div>
        <div class="stat-value" style="color:${totalProfit >= 0 ? '#059669' : '#dc2626'};">${money(totalProfit)}</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Avg Margin</div>
        <div class="stat-value" style="color:${avgMargin >= 20 ? '#059669' : avgMargin >= 0 ? '#d97706' : '#dc2626'};">${avgMargin.toFixed(1)}%</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Shopify Fees</div>
        <div class="stat-value" style="color:#6b7280;">${money(totalFees)}</div>
      </div>
    </div>
    ${productStats.length === 0 ? emptyState('No Sales Data', 'Profit breakdown will appear once your store has paid orders.') : `
    <div class="card" style="overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Product</th>
              <th class="text-right">Units</th>
              <th class="text-right">Revenue</th>
              <th class="text-right">COGS</th>
              <th class="text-right">Fees</th>
              <th class="text-right">Net Profit</th>
              <th class="text-right">Margin</th>
            </tr>
          </thead>
          <tbody>
            ${productStats.map(p => `
              <tr>
                <td>${productCell(p)}</td>
                <td class="text-right" style="font-weight:600;">${p.unitsSold}</td>
                <td class="text-right" style="font-weight:600;">${money(p.revenue)}</td>
                <td class="text-right" style="color:#6b7280;">${money(p.totalCost)}</td>
                <td class="text-right" style="color:#9ca3af;">${money(p.shopifyFees)}</td>
                <td class="text-right" style="font-weight:700;color:${p.netProfit >= 0 ? '#059669' : '#dc2626'};">${money(p.netProfit)}</td>
                <td class="text-right">${marginBadge(p.margin)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    `}
    <p style="font-size:11px;color:#9ca3af;margin-top:16px;font-weight:500;">Fees estimated at 2.9% + $0.30/txn (Shopify Payments). COGS estimated from compare-at-price or 60% markup assumption.</p>
  `;
}

// ═══════════════════════════ PRICE EDITOR ═══════════════════════════

function renderPrices() {
  priceChanges = {};
  const el = document.getElementById('content-prices');

  if (products.length === 0) {
    el.innerHTML = emptyState('No Products', 'Sync your store to see and edit product prices.');
    return;
  }

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <input type="text" id="price-search" placeholder="Search products..." class="input-field" style="width:260px;" oninput="filterPriceTable()">
        <span id="change-count" style="font-size:12px;color:#9ca3af;font-weight:500;"></span>
      </div>
      <button id="btn-update-all" onclick="pushAllPrices()" class="btn-primary" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/></svg>
        Push to Shopify
      </button>
    </div>
    <div class="card" style="overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Product</th>
              <th class="text-right">Current Price</th>
              <th class="text-right">New Price</th>
              <th class="text-right">Compare At</th>
              <th class="text-center" style="width:100px;">Status</th>
            </tr>
          </thead>
          <tbody id="price-tbody">
            ${products.map(p => priceRow(p)).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <p style="font-size:11px;color:#9ca3af;margin-top:16px;font-weight:500;">Edit prices inline and click "Push to Shopify" to apply changes to your live store.</p>
  `;
}

function priceRow(p) {
  return `
    <tr class="price-row" data-id="${p.id}" data-title="${(p.title||'').toLowerCase()}">
      <td>${productCell(p)}</td>
      <td class="text-right" style="color:#6b7280;">${money(p.price || 0)}</td>
      <td class="text-right">
        <input type="number" step="0.01" min="0" value="${(p.price || 0).toFixed(2)}" class="input-field" style="width:100px;text-align:right;" onchange="onPriceChange('${p.id}', 'price', this.value, ${p.price || 0})">
      </td>
      <td class="text-right">
        <input type="number" step="0.01" min="0" value="${(p.compare_at_price || 0).toFixed(2)}" class="input-field" style="width:100px;text-align:right;" onchange="onPriceChange('${p.id}', 'compare_at_price', this.value, ${p.compare_at_price || 0})">
      </td>
      <td class="text-center" id="status-${p.id}"><span style="color:#d1d5db;">—</span></td>
    </tr>
  `;
}

function onPriceChange(id, field, newVal, origVal) {
  const val = parseFloat(newVal);
  if (!priceChanges[id]) priceChanges[id] = {};
  if (Math.abs(val - origVal) > 0.001) {
    priceChanges[id][field] = val;
  } else {
    delete priceChanges[id][field];
    if (Object.keys(priceChanges[id]).length === 0) delete priceChanges[id];
  }
  updateChangeCount();
}

function updateChangeCount() {
  const count = Object.keys(priceChanges).length;
  const countEl = document.getElementById('change-count');
  const btnEl = document.getElementById('btn-update-all');
  if (countEl) countEl.textContent = count > 0 ? `${count} product${count > 1 ? 's' : ''} changed` : '';
  if (btnEl) btnEl.style.display = count > 0 ? 'inline-flex' : 'none';
}

function filterPriceTable() {
  const q = (document.getElementById('price-search')?.value || '').toLowerCase();
  document.querySelectorAll('.price-row').forEach(row => {
    row.style.display = row.dataset.title.includes(q) ? '' : 'none';
  });
}

async function pushAllPrices() {
  const ids = Object.keys(priceChanges);
  if (ids.length === 0) return;
  const btn = document.getElementById('btn-update-all');
  btn.disabled = true;
  btn.innerHTML = '<div style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;"></div> Updating...';

  let success = 0, failed = 0;
  for (const id of ids) {
    const changes = priceChanges[id];
    const statusEl = document.getElementById('status-' + id);
    if (statusEl) statusEl.innerHTML = '<div style="width:16px;height:16px;border:2px solid #e5e7eb;border-top-color:#3B82F6;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto;"></div>';

    try {
      const product = products.find(p => p.id === id);
      const body = {
        price: changes.price ?? product?.price ?? 0,
        compare_at_price: changes.compare_at_price ?? product?.compare_at_price ?? null
      };
      const res = await fetch(`/shopify-app/api/products/${id}/price?shop=${encodeURIComponent(SHOP)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        success++;
        if (statusEl) statusEl.innerHTML = '<span class="badge badge-green">Updated</span>';
        delete priceChanges[id];
      } else {
        const d = await res.json();
        failed++;
        if (statusEl) statusEl.innerHTML = `<span class="badge badge-red" title="${d.error || 'Error'}">Failed</span>`;
      }
    } catch {
      failed++;
      if (statusEl) statusEl.innerHTML = '<span class="badge badge-red">Error</span>';
    }
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/></svg> Push to Shopify';
  updateChangeCount();
  showToast(failed === 0 ? `${success} product${success > 1 ? 's' : ''} updated` : `${success} updated, ${failed} failed`, failed > 0);
}

// ═══════════════════════════ SEO SCORER ═══════════════════════════

function scoreSEO(p) {
  let score = 0;
  const checks = [];

  const title = (p.title || '').trim();
  const titleLen = title.length;
  if (titleLen >= 50 && titleLen <= 70) { score += 20; checks.push({ label: 'Title Length', pts: 20, max: 20, tip: 'Ideal (50-70 chars)', status: 'pass' }); }
  else if (titleLen >= 30 && titleLen <= 100) { score += 12; checks.push({ label: 'Title Length', pts: 12, max: 20, tip: `${titleLen} chars — aim for 50-70`, status: 'warn' }); }
  else if (titleLen > 0) { score += 5; checks.push({ label: 'Title Length', pts: 5, max: 20, tip: `${titleLen} chars — too ${titleLen < 30 ? 'short' : 'long'}`, status: 'fail' }); }
  else { checks.push({ label: 'Title Length', pts: 0, max: 20, tip: 'Missing title', status: 'fail' }); }

  const desc = (p.body_html || '').trim();
  const descText = desc.replace(/<[^>]*>/g, '').trim();
  const descLen = descText.length;
  if (descLen >= 150) { score += 15; checks.push({ label: 'Description', pts: 15, max: 15, tip: 'Good length', status: 'pass' }); }
  else if (descLen >= 50) { score += 8; checks.push({ label: 'Description', pts: 8, max: 15, tip: `${descLen} chars — aim for 150+`, status: 'warn' }); }
  else if (descLen > 0) { score += 3; checks.push({ label: 'Description', pts: 3, max: 15, tip: 'Too short — add more detail', status: 'fail' }); }
  else { checks.push({ label: 'Description', pts: 0, max: 15, tip: 'Missing description', status: 'fail' }); }

  const hasHtml = /<(p|ul|li|h[1-6]|br|strong|em)\b/i.test(desc);
  if (hasHtml && descLen > 0) { score += 10; checks.push({ label: 'Formatting', pts: 10, max: 10, tip: 'Uses HTML formatting', status: 'pass' }); }
  else if (descLen > 0) { score += 3; checks.push({ label: 'Formatting', pts: 3, max: 10, tip: 'Add headings, lists or bold text', status: 'warn' }); }
  else { checks.push({ label: 'Formatting', pts: 0, max: 10, tip: 'No description to format', status: 'fail' }); }

  if (p.image_url) { score += 20; checks.push({ label: 'Product Image', pts: 20, max: 20, tip: 'Has image', status: 'pass' }); }
  else { checks.push({ label: 'Product Image', pts: 0, max: 20, tip: 'Missing product image', status: 'fail' }); }

  if (p.price && p.price > 0) { score += 10; checks.push({ label: 'Price Set', pts: 10, max: 10, tip: 'Price configured', status: 'pass' }); }
  else { checks.push({ label: 'Price Set', pts: 0, max: 10, tip: 'No price set', status: 'fail' }); }

  if (p.compare_at_price && p.compare_at_price > (p.price || 0)) { score += 5; checks.push({ label: 'Compare Price', pts: 5, max: 5, tip: 'Shows savings to customers', status: 'pass' }); }
  else { checks.push({ label: 'Compare Price', pts: 0, max: 5, tip: 'Add compare-at price to show savings', status: 'warn' }); }

  const tags = p.tags || [];
  const tagCount = Array.isArray(tags) ? tags.length : (typeof tags === 'string' ? tags.split(',').filter(Boolean).length : 0);
  if (tagCount >= 5) { score += 20; checks.push({ label: 'Tags', pts: 20, max: 20, tip: `${tagCount} tags — great`, status: 'pass' }); }
  else if (tagCount >= 2) { score += 10; checks.push({ label: 'Tags', pts: 10, max: 20, tip: `${tagCount} tags — add more`, status: 'warn' }); }
  else if (tagCount >= 1) { score += 5; checks.push({ label: 'Tags', pts: 5, max: 20, tip: 'Add more tags (aim for 5+)', status: 'warn' }); }
  else { checks.push({ label: 'Tags', pts: 0, max: 20, tip: 'No tags — add keywords', status: 'fail' }); }

  return { score, checks };
}

function renderSEO() {
  const el = document.getElementById('content-seo');

  if (products.length === 0) {
    el.innerHTML = emptyState('No Products', 'Sync your store to analyze product SEO.');
    return;
  }

  const scored = products.map(p => ({ ...p, seo: scoreSEO(p) }));
  scored.sort((a, b) => a.seo.score - b.seo.score);

  const avgScore = scored.reduce((s, p) => s + p.seo.score, 0) / scored.length;
  const needsWork = scored.filter(p => p.seo.score < 50).length;
  const good = scored.filter(p => p.seo.score >= 75).length;

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
      <div class="card stat-card">
        <div class="stat-label">Average Score</div>
        <div class="stat-value" style="color:${avgScore >= 70 ? '#059669' : avgScore >= 40 ? '#d97706' : '#dc2626'};">${avgScore.toFixed(0)}<span style="font-size:14px;font-weight:600;color:#9ca3af;">/100</span></div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Products Analyzed</div>
        <div class="stat-value" style="color:#111827;">${scored.length}</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Needs Work</div>
        <div class="stat-value" style="color:${needsWork > 0 ? '#dc2626' : '#059669'};">${needsWork}</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Good (75+)</div>
        <div class="stat-value" style="color:#059669;">${good}</div>
      </div>
    </div>
    <div class="card" style="overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Product</th>
              <th class="text-center" style="width:160px;">Score</th>
              <th>Top Issues</th>
            </tr>
          </thead>
          <tbody>
            ${scored.map(p => {
              const issues = p.seo.checks.filter(c => c.pts < c.max).slice(0, 3);
              const barColor = p.seo.score >= 75 ? '#059669' : p.seo.score >= 50 ? '#d97706' : '#dc2626';
              return `
              <tr style="cursor:pointer;" onclick="toggleSeoDetail('${p.id}')">
                <td>${productCell(p)}</td>
                <td class="text-center">
                  <div style="display:flex;align-items:center;gap:10px;">
                    <div class="seo-bar" style="flex:1;"><div class="seo-bar-fill" style="width:${p.seo.score}%;background:${barColor};"></div></div>
                    <span style="font-size:12px;font-weight:700;color:${barColor};min-width:32px;">${p.seo.score}</span>
                  </div>
                </td>
                <td style="color:#6b7280;font-size:12px;">
                  ${issues.length === 0 ? '<span style="color:#059669;font-weight:600;">All checks passed</span>' : issues.map(i => i.tip).join(' &middot; ')}
                </td>
              </tr>
              <tr id="seo-detail-${p.id}" class="hidden">
                <td colspan="3" style="background:#f9fafb;padding:16px 20px;">
                  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">
                    ${p.seo.checks.map(c => {
                      const iconBg = c.status === 'pass' ? '#ecfdf5' : c.status === 'warn' ? '#fffbeb' : '#fef2f2';
                      const iconColor = c.status === 'pass' ? '#059669' : c.status === 'warn' ? '#d97706' : '#dc2626';
                      const icon = c.status === 'pass' ? '&#10003;' : c.status === 'warn' ? '!' : '&#10005;';
                      return `
                      <div style="display:flex;align-items:flex-start;gap:8px;">
                        <span class="check-icon" style="background:${iconBg};color:${iconColor};margin-top:1px;">${icon}</span>
                        <div>
                          <div style="font-size:12px;font-weight:600;color:#374151;">${c.label} <span style="color:#9ca3af;font-weight:500;">${c.pts}/${c.max}</span></div>
                          <div style="font-size:11px;color:#6b7280;margin-top:2px;">${c.tip}</div>
                        </div>
                      </div>`;
                    }).join('')}
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function toggleSeoDetail(id) {
  const el = document.getElementById('seo-detail-' + id);
  if (el) el.classList.toggle('hidden');
}

  return `
    <div class="card" style="padding:64px 24px;text-align:center;">
      <div style="width:48px;height:48px;background:#f3f4f6;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5"><path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-2.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
