<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USDrop AI — Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3b82f6;
      --blue-glow: #60a5fa;
      --blue-dim: #1d4ed8;
      --white: #f8fafc;
      --muted: #64748b;
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: var(--font);
      overflow: hidden;
      color: var(--white);
    }
    #canvas { position: fixed; inset: 0; z-index: 0; }

    /* Ambient orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 1; }
    .orb-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(59,130,246,0.22) 0%, transparent 70%);
      top: -200px; left: -200px;
    }
    .orb-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(96,165,250,0.14) 0%, transparent 70%);
      bottom: -150px; right: -150px;
    }

    /* Corner brackets */
    .corner { position: fixed; width: 44px; height: 44px; }
    .corner-tl { top: 32px; left: 32px; border-top: 1.5px solid rgba(59,130,246,0.55); border-left: 1.5px solid rgba(59,130,246,0.55); }
    .corner-tr { top: 32px; right: 32px; border-top: 1.5px solid rgba(59,130,246,0.55); border-right: 1.5px solid rgba(59,130,246,0.55); }
    .corner-bl { bottom: 32px; left: 32px; border-bottom: 1.5px solid rgba(59,130,246,0.55); border-left: 1.5px solid rgba(59,130,246,0.55); }
    .corner-br { bottom: 32px; right: 32px; border-bottom: 1.5px solid rgba(59,130,246,0.55); border-right: 1.5px solid rgba(59,130,246,0.55); }

    /* Scene */
    #scene {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
    }

    /* Logo */
    #logo-wrap { position: relative; display: flex; align-items: center; }
    .logo-text {
      font-size: 80px; font-weight: 800;
      letter-spacing: -0.03em; line-height: 1;
      color: var(--white);
    }
    .ai-badge {
      color: var(--blue); font-weight: 800;
      position: relative; display: inline-block;
    }
    .ai-bg {
      position: absolute; inset: -5px -8px;
      border-radius: 8px;
      background: rgba(59,130,246,0.14);
    }

    /* Tagline */
    #tagline {
      margin-top: 16px;
      font-size: 15px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted);
    }

    /* Divider */
    #divider {
      margin-top: 44px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    /* Loader */
    #loader-wrap {
      margin-top: 40px;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }
    #bar-track {
      width: 340px; height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px; overflow: hidden; position: relative;
    }
    #bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--blue-dim), var(--blue), var(--blue-glow));
      box-shadow: 0 0 14px var(--blue);
    }
    #bar-glint {
      position: absolute; top: 0; height: 100%; width: 50px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
    }
    #status {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted);
    }
    #dots { display: flex; gap: 7px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); }

    /* Version */
    #version {
      position: fixed; bottom: 36px; right: 40px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(100,116,139,0.45);
    }
  </style>
</head>
<body>
  <div class="orb orb-1" id="orb1"></div>
  <div class="orb orb-2" id="orb2"></div>
  <canvas id="canvas"></canvas>
  <div class="corner corner-tl" id="c-tl"></div>
  <div class="corner corner-tr" id="c-tr"></div>
  <div class="corner corner-bl" id="c-bl"></div>
  <div class="corner corner-br" id="c-br"></div>

  <div id="scene">
    <div id="logo-wrap">
      <span class="logo-text">USDrop&nbsp;<span class="ai-badge"><span class="ai-bg"></span>AI</span></span>
    </div>
    <div id="tagline">Intelligent Drop Shipping Platform</div>
    <div id="divider"></div>
    <div id="loader-wrap">
      <div id="bar-track">
        <div id="bar-fill"></div>
        <div id="bar-glint"></div>
      </div>
      <div id="status">Initializing</div>
      <div id="dots">
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
      </div>
    </div>
  </div>
  <div id="version">v2.0</div>

  <script>
    // ── Easing functions ──────────────────────────────────────────
    const easeOutCubic  = t => 1 - Math.pow(1 - t, 3);
    const easeInOutCubic = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    const easeOutQuart  = t => 1 - Math.pow(1 - t, 4);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const lerp  = (a, b, t) => a + (b - a) * t;

    // ── Particle field ────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth  || 1920;
    canvas.height = window.innerHeight || 1080;

    class Particle {
      constructor(seed) {
        this.seed = seed;
        this.reset();
      }
      reset() {
        this.x    = Math.random() * 1920;
        this.y    = Math.random() * 1080;
        this.vx   = (Math.random() - 0.5) * 0.25;
        this.vy   = -(Math.random() * 0.5 + 0.1);
        this.r    = Math.random() * 1.5 + 0.4;
        this.maxAlpha = Math.random() * 0.45 + 0.08;
        this.life = Math.random() * 400;
        this.maxLife = Math.random() * 350 + 200;
        this.isBlue = Math.random() < 0.22;
      }
      draw(globalAlpha) {
        const lifeRatio = this.life / this.maxLife;
        const fade = lifeRatio < 0.1 ? lifeRatio / 0.1
                   : lifeRatio > 0.85 ? (1 - lifeRatio) / 0.15
                   : 1;
        const a = this.maxAlpha * fade * globalAlpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.isBlue
          ? `rgba(96,165,250,${a})`
          : `rgba(220,230,255,${a * 0.55})`;
        ctx.fill();
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        if (this.life > this.maxLife || this.y < -5) this.reset();
      }
    }

    const particles = Array.from({ length: 180 }, (_, i) => new Particle(i));

    // ── JS-driven timeline render ─────────────────────────────────
    // t = 0..1 over the full 7-second animation
    window.renderFrame = function(t) {
      const T = t * 7000; // ms

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Particles fade in from t=0
      const pAlpha = clamp(T / 800, 0, 1);
      particles.forEach(p => p.draw(pAlpha));

      // ── Orbs ──────────────────────────────────────────────────
      const orbA = clamp(easeOutCubic((T - 200) / 1000), 0, 1);
      document.getElementById('orb1').style.opacity = orbA * 0.9;
      document.getElementById('orb2').style.opacity = orbA * 0.7;

      // ── Corner brackets ───────────────────────────────────────
      const cornerA = clamp(easeOutCubic((T - 600) / 600), 0, 1);
      ['c-tl','c-tr','c-bl','c-br'].forEach(id => {
        document.getElementById(id).style.opacity = cornerA;
      });

      // ── Logo reveal (slide up + fade) ─────────────────────────
      const logoP = clamp((T - 700) / 900, 0, 1);
      const logoE = easeOutQuart(logoP);
      const logoWrap = document.getElementById('logo-wrap');
      logoWrap.style.opacity  = logoE;
      logoWrap.style.transform = `translateY(${lerp(28, 0, logoE)}px) scale(${lerp(0.9, 1, logoE)})`;

      // ── Tagline ───────────────────────────────────────────────
      const tagP = clamp((T - 1200) / 700, 0, 1);
      const tagE = easeOutCubic(tagP);
      const tagline = document.getElementById('tagline');
      tagline.style.opacity   = tagE;
      tagline.style.transform = `translateY(${lerp(12, 0, tagE)}px)`;

      // ── Divider line expand ───────────────────────────────────
      const divP = clamp((T - 1600) / 800, 0, 1);
      const divE = easeInOutCubic(divP);
      document.getElementById('divider').style.width = `${lerp(0, 360, divE)}px`;

      // ── Loader fade in ────────────────────────────────────────
      const loadA = clamp((T - 1900) / 500, 0, 1);
      document.getElementById('loader-wrap').style.opacity = easeOutCubic(loadA);

      // ── Progress bar ──────────────────────────────────────────
      // Keyframes: 0%@2100ms → 35%@2800ms → 62%@3500ms → 78%@4200ms → 91%@4800ms → 100%@5200ms
      let barPct = 0;
      if (T >= 2100) {
        const kf = [
          [2100, 0], [2800, 35], [3500, 62], [4200, 78], [4800, 91], [5200, 100]
        ];
        for (let i = 0; i < kf.length - 1; i++) {
          const [t0, v0] = kf[i], [t1, v1] = kf[i+1];
          if (T >= t0 && T <= t1) {
            barPct = lerp(v0, v1, easeInOutCubic((T - t0) / (t1 - t0)));
            break;
          } else if (T > t1 && i === kf.length - 2) {
            barPct = v1;
          }
        }
      }
      document.getElementById('bar-fill').style.width = `${barPct}%`;

      // Glint rides the bar
      const glintX = (barPct / 100) * 340 - 50;
      document.getElementById('bar-glint').style.left = `${glintX}px`;

      // ── Status text ───────────────────────────────────────────
      const statusEl = document.getElementById('status');
      const steps = [
        [2100, 'Initializing'],
        [2800, 'Loading modules'],
        [3500, 'Connecting AI engine'],
        [4200, 'Syncing market data'],
        [4800, 'Ready'],
      ];
      let statusText = '';
      let isReady = false;
      for (let i = steps.length - 1; i >= 0; i--) {
        if (T >= steps[i][0]) { statusText = steps[i][1]; isReady = (i === steps.length - 1); break; }
      }
      statusEl.textContent = statusText;
      statusEl.style.color = isReady ? '#60a5fa' : 'var(--muted)';

      // ── Dot bounce ────────────────────────────────────────────
      const dotIds = ['d1','d2','d3'];
      dotIds.forEach((id, i) => {
        const phase = (T / 400 + i * 0.6) % 1;
        const bounce = phase < 0.5 ? Math.sin(phase * Math.PI) : 0;
        const s = lerp(0.6, 1.3, bounce);
        const a = lerp(0.35, 1, bounce);
        document.getElementById(id).style.transform = `scale(${s})`;
        document.getElementById(id).style.opacity = a;
      });

      // ── Version tag ───────────────────────────────────────────
      const verA = clamp((T - 2200) / 500, 0, 1);
      document.getElementById('version').style.opacity = easeOutCubic(verA) * 0.45;

      // ── AI badge pulse (after 2s) ─────────────────────────────
      if (T > 2000) {
        const pulseT = ((T - 2000) / 2400) % 1;
        const pulse  = 0.5 + 0.5 * Math.sin(pulseT * Math.PI * 2);
        document.querySelector('.ai-bg').style.opacity = lerp(0.6, 1, pulse);
        document.querySelector('.ai-bg').style.transform = `scale(${lerp(1, 1.05, pulse)})`;
      }
    };

    // Auto-play for browser preview
    let startTime = null;
    const TOTAL_DURATION = 7000;
    function autoPlay(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      const t = Math.min(elapsed / TOTAL_DURATION, 1);
      window.renderFrame(t);
      if (t < 1) requestAnimationFrame(autoPlay);
      else window.renderFrame(1);
    }
    requestAnimationFrame(autoPlay);
  </script>
</body>
</html>
